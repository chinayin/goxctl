# goreleaser v2 配置：构建多平台预编译二进制并发布到 GitHub Releases。
# 本地校验：goreleaser check / goreleaser release --snapshot --clean
version: 2

project_name: goxctl

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/goxctl
    binary: goxctl
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  # 产物名不含版本号：让 install.sh 可用稳定的 releases/latest/download/<asset> 直链
  - formats: ['tar.gz']
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: chinayin
    name: goxctl
